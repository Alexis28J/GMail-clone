<section class="toolbar">

    <button mat-icon-button class="Btn-noBorder" matTooltip="Back to Inbox" matTooltipPosition="below">
        <mat-icon>arrow_back</mat-icon>
    </button>

    <!-- <input type="checkbox" [checked]="allSelected" (change)="toggleSelectAll($event)"  matTooltip="Select All" matTooltipPosition="above" /> -->
    <mat-checkbox [checked]="allSelected()" [indeterminate]="isPartiallySelected()" (change)="toggleSelectAll($event)"
        matTooltip="Select All" matTooltipPosition="above" class="select-all-checkbox"></mat-checkbox>

    <div class="btn-container">
        <div class="btn-group">
            <button mat-icon-button class="Btn-noBorder" matTooltip="Archive" matTooltipPosition="below">
                <mat-icon>archive</mat-icon>
            </button>

            <button mat-icon-button class="Btn-noBorder" matTooltip="Spam" matTooltipPosition="below">
                <mat-icon>report</mat-icon>
            </button>

            <button mat-icon-button class="Btn-noBorder" matTooltip="Delete" matTooltipPosition="below"
                (click)="onDelete()">
                <mat-icon>delete</mat-icon>
            </button>

            @if (isTrashView) {
            <button mat-icon-button class="Btn-noBorder" matTooltip="Restore" matTooltipPosition="below"
                (click)="onRestore()">
                <mat-icon>restore_from_trash</mat-icon>
            </button>
            }
        </div>

        <div class="btn-group">
            <button mat-icon-button class="Btn-noBorder" matTooltip="Unread" matTooltipPosition="below">
                <mat-icon>mark_email_unread</mat-icon>
            </button>

            <button mat-icon-button class="Btn-noBorder" matTooltip="Snooze" matTooltipPosition="below">
                <mat-icon>watch_later</mat-icon>
            </button>

            <button mat-icon-button class="Btn-noBorder" matTooltip="Read" matTooltipPosition="below">
                <mat-icon>check_circle</mat-icon>
            </button>
        </div>

        <div class="btn-group" style="border-right: none">
            <button mat-icon-button class="Btn-noBorder" style="padding-bottom: 3px;" matTooltip="Move to"
                matTooltipPosition="below">
                <mat-icon>next_week</mat-icon>
            </button>

            <button mat-icon-button class="Btn-noBorder" matTooltip="Label" matTooltipPosition="below">
                <mat-icon>label</mat-icon>
            </button>

            <button mat-icon-button class="Btn-noBorder" matTooltip="More" matTooltipPosition="below">
                <mat-icon>more_vert</mat-icon>
            </button>
        </div>
    </div>

    <span class="spacer"></span>

    <button mat-icon-button matTooltip="Previous email" matTooltipPosition="below" class="previous-next-btn"
        (click)="onPrev()">
        <mat-icon>chevron_left</mat-icon>
    </button>

    <button mat-icon-button matTooltip="Next email" matTooltipPosition="below" class="previous-next-btn"
        (click)="onNext()">
        <mat-icon>chevron_right</mat-icon>
    </button>

</section>



<!------------------------------ COMENTI --------------------------------->

<!-- In Angular Material, matTooltipPosition è una direttiva che ti permette di definire l'area dello schermo in cui compare il fumetto informativo (tooltip) rispetto all'elemento con cui l'utente interagisce. 
 Essa serve a prevenire sovrapposizioni e garantire che il testo rimanga sempre leggibile. -->


<!-- (click) = "onRestore()" serve per emettere l'evento di ripristino delle email selezionate. 
  Ma a condizione che isTrashView sia true, il pulsante di ripristino sarà visibile e abilitato. -->

<!-- (change) = "toggleSelectAll($event)" serve per cambiare lo stato di selezione globale delle email in base all'interazione dell'utente con la checkbox nella toolbar.
   (change) serve a catturare l'evento di cambiamento della checkbox e a chiamare il metodo toggleSelectAll passando l'evento come argomento. -->
