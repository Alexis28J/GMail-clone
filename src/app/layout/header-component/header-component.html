<header class="header">

    <div class="header-left">

        <div class="logo">
            <mat-icon fontSet="material-symbols-outlined">mail</mat-icon>
            <span class="logo-text">Mail Client</span>
        </div>
    </div>


    <div class="header-center">
        <div class="search-box">
            <!-- <input type="text" placeholder="Search" (input)="onSearch($event.target.value)"/> -->
            <!-- <input type="text" placeholder="Search" #searchInput (input)="onSearch(searchInput.value)"/> -->
            <input type="text" placeholder="Search" #searchInput (keyup.enter)="onSearch(searchInput.value)" />

            <button class="icon-btn" matTooltip="Filter by" matTooltipPosition="below"
                [matMenuTriggerFor]="filterMenu"><mat-icon fontSet="material-symbols-outlined"
                    style="transform: rotate(90deg);">instant_mix</mat-icon></button>
        </div>

        <!----------------------- MENU FILTRI ------------------>

        <mat-menu #filterMenu="matMenu">
            <div class="filter-menu">

                <p class="filter-title">Filter by</p>

                <label>
                    <input type="checkbox" (change)="toggleFilter('subject', $event)" [checked]="folderService.getFilters()().subject"> Subject
                </label>

                <label>
                    <input type="checkbox" (change)="toggleFilter('sender', $event)" [checked]="folderService.getFilters()().sender"> Sender
                </label>

                <label>
                    <input type="checkbox" (change)="toggleFilter('date', $event)" [checked]="folderService.getFilters()().date"> Date
                </label>

            </div>
        </mat-menu>


        <!------------------------  ICONE DI DESTRA -------------------------------->
        <div class="search-icon">
            <button class="icon-btn" matTooltip="Search" matTooltipPosition="below"
                (click)="onSearch(searchInput.value)"><mat-icon
                    fontSet="material-symbols-outlined">search</mat-icon></button>
        </div>
    </div>


    <div class="header-right">
        <button class="icon-btn" matTooltip="Settings" matTooltipPosition="below">
            <mat-icon fontSet="material-symbols-outlined">settings</mat-icon>
        </button>

        <button class="icon-btn" matTooltip="Notifications" matTooltipPosition="below">
            <mat-icon fontSet="material-symbols-outlined">notifications</mat-icon>
        </button>


        <div class="user-avatar">

            <button class="icon-btn" matTooltip="User" matTooltipPosition="below" [matMenuTriggerFor]="userMenu">
                @if(!isLoggedIn()){
                <mat-icon fontSet="material-symbols-outlined">person</mat-icon>
                } @else {
                <span class="avatar-letter">
                    {{ currentUser()?.username?.[0]?.toUpperCase() ?? 'U'}}
                </span>
                }
            </button>

            <mat-menu #userMenu>
                <!-------------------- NON LOGGATO ----------------------------->

                @if(!isLoggedIn()){

                <button mat-menu-item (click)="goToLogin(); $event.stopPropagation()">
                    <mat-icon>login</mat-icon>
                    <span>Login</span>
                </button>

                <button mat-menu-item (click)="goToRegister(); $event.stopPropagation()">
                    <mat-icon>person_add</mat-icon>
                    <span>Register</span>
                </button>

                } @else {

                <button mat-menu-item disabled>
                    <mat-icon>person</mat-icon>
                    <span>
                        {{ currentUser()?.username }}<br />
                        <small>{{ currentUser()?.email }}</small>
                    </span>
                </button>

                <button mat-menu-item (click)="logout(); $event.stopPropagation()">
                    <mat-icon>logout</mat-icon>
                    <span>Logout</span>
                </button>

                }

            </mat-menu>

        </div>

    </div>

</header>


<!-- --------------------------------- COMMENTI  ---------------------------------------------------->

<!-- mat-icon è un componente di Angular Material che permette di visualizzare icone. In questo caso, viene utilizzato il set di icone "material-symbols-outlined". -->

<!-- matTooltip è una direttiva di Angular Material che permette di visualizzare un tooltip quando l'utente passa il mouse sopra un elemento. -->

<!-- fontSet è un attributo di mat-icon che permette di specificare il set di icone da utilizzare. In questo caso, viene utilizzato il set "material-symbols-outlined". -->

<!-- mat-menu è un componente di Angular Material che permette di creare un menu a discesa. In questo caso, viene utilizzato per il menu utente. -->

<!-- mat-menu-item è un componente di Angular Material che rappresenta un elemento all'interno di un mat-menu. -->

<!-- #userMenu è un riferimento locale al mat-menu, utilizzato per collegare il menu al pulsante che lo apre. -->

<!-- Nell'input di ricerca, utilizzo l'evento (input) per chiamare il metodo onSearch() del componente HeaderComponent, passando il valore dell'input come argomento.
 $event significa l'evento che ha attivato la funzione, in questo caso l'evento di input dell'elemento input. 
 .target si riferisce all'elemento che ha generato l'evento, in questo caso l'input di testo.
 .value è il valore corrente dell'input di testo. 
 Quindi, $event.target.value rappresenta il testo che l'utente ha digitato nell'input di ricerca. -->

<!-- NB: tolgo (input) se voglio usare SOLO il click della lente -->
<!-- NB: (input)="onSearch(searchInput.value)" : ricerca live + click. Live typing tipo Gmail e l'icona di ricerca funziona comunque -->

<!-- La differenza tra (input)="onSearch($event.target.value)" e (input)="onSearch(searchInput.value)" è che nel primo caso si passa l'evento (in questo caso l'evento di input) al componente, 
    mentre nel secondo caso si utilizza un riferimento locale (#searchInput) per accedere direttamente al valore dell'input. 
    In parole semplici, il primo metodo è più generico, mentre il secondo è più diretto e leggibile. -->

<!-- Ho modificato l'input di ricerca per utilizzare un riferimento locale #searchInput invece di (input)="onSearch($event.target.value)". 
  Questo permette di accedere al valore dell'input direttamente nel template senza dover passare l'evento al componente.
  (keyup.enter)="onSearch(searchInput.value)" serve per eseguire la ricerca quando l'utente preme il tasto Invio.
  Quindi con il riferimento locale #searchInput e con l'evento (keyup.enter), possiamo eseguire la ricerca premendo Invio o cliccando sull'icona di ricerca. -->

  <!-- Ho aggiunto [checked]="..." a ciascun checkbox per legarlo allo stato dei filtri nel servizio Folder. 
   Questo permette di mantenere sincronizzato lo stato dei checkbox con i filtri attivi nel servizio.
   Cio significa che quando lo stato dei filtri cambia nel servizio, i checkbox nel template vengono aggiornati automaticamente. -->
