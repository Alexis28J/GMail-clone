<nav>

    @for(folder of folders; track folder.id){

    <div class="menu-item" (click)="onSelect(folder.id)">
        <div class="menu-left">
            <mat-icon>{{ folder.icon }}</mat-icon>
            <span>{{ folder.name }}</span>
        </div>

        @if(folder.count){
        <span class="count">{{ folder.count }}</span>
        }
    </div>

    }

</nav>
