<div class="confirm-dialog-container">
  <h2 mat-dialog-title>Are you sure?</h2>

  <!-- <mat-dialog-content>{{data.message}}</mat-dialog-content> -->
  <mat-dialog-content [innerHTML]="data.message"></mat-dialog-content>

  <mat-dialog-actions align="end">
    <button class="confirm-dialog-btn cancel-btn" mat-button mat-dialog-close="false">Cancel</button>
    <button class="confirm-dialog-btn proceed-btn" mat-button [mat-dialog-close]="true">Proceed</button>
  </mat-dialog-actions>
</div>
