
<!------------------------------------------ TITOLO ------------------------------------------------->
<h2 mat-dialog-title class="signature-title">
    <mat-icon>draw</mat-icon>
    <span>Email Signatures</span>
</h2>


<!--------------------------------------- CONTENUTO ------------------------------------------------->
<mat-dialog-content>

    <div class="signature-layout">

        <!--------------------------- LISTA DELLE FIRME -------------------------------->
        <div class="signature-list">

            <!-- SWITCH DI ABILITAZIONE FIRMA -->
            <mat-slide-toggle [(ngModel)]="enabled" (change)="toggleEnabled()">
                Enable Signature
            </mat-slide-toggle>


            <!-- CICLO PER CREARE GLI ELEMENTI DELLA LISTA DELLE FIRME -->
            @for(signature of signatureService.signatures(); track signature.id) {

            <div class="signature-item">

                <input type="radio" name="defaultSignature"
                    [checked]="signature.id === signatureService.activeSignatureId()"
                    (change)="setDefault(signature.id)">

                <button (click)="selectSignature(signature)">
                    {{ signature.name }}
                </button>

            </div>

            }

            <button class="add-btn" mat-stroked-button color="primary" (click)="newSignature()">
                <mat-icon>add</mat-icon>

                Add Signature
            </button>

        </div>


        <!-- LINEA DIVISORIA -->
        <div class="spacer"></div>


        <!---------------------------------------- EDITOR DELLA FIRMA ------------------------------------->
        <div class="signature-editor">

            <!-- DESCRIZIONE DELLA FUNZIONALITÀ -->
            <p class="description">
                This signature will automatically be appended to new emails, replies and forwarded messages.
            </p>

            <!-- INPUT DEL NOME DELLA FIRMA -->
            <mat-form-field appearance="outline" subscriptSizing="dynamic">

                <mat-label>Signature Name</mat-label>
                <input matInput [(ngModel)]="name">

            </mat-form-field>


            <!-- INPUT DEL CONTENUTO DELLA FIRMA -->
            <mat-form-field appearance="outline" subscriptSizing="dynamic">

                <mat-label>Signature Content</mat-label>
                <textarea matInput rows="6" [(ngModel)]="content">
                    </textarea>

            </mat-form-field>


            <!-- ANTEPRIMA DELLA FIRMA -->
            <div class="preview-section">

                <h3>Preview</h3>

                <div class="preview-box">
                    {{ content }}
                </div>

            </div>

        </div>

    </div>

</mat-dialog-content>


<!-- PULSANTI DELETE E SAVE -->
<mat-dialog-actions align="end">

    <button mat-stroked-button color="warn" (click)="delete()" class="delete-btn">
        Delete
    </button>

    <button mat-flat-button color="primary" (click)="save()" class="save-btn">
        Save
    </button>

</mat-dialog-actions>
